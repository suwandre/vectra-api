# fly.toml app configuration file generated for vectra-api on 2025-05-12T17:04:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vectra-api'
primary_region = 'hkg'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
